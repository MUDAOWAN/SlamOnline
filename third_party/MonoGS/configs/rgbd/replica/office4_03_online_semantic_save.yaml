# Run from /home/sky/czh/SplatGraph/SlamOnline/third_party/MonoGS:
#   python slam.py --config configs/rgbd/replica/office4_03_online_semantic_save.yaml
#
# Replica office4 sampled with sample_ratio=0.3 under
# ../../datasets/Replica/office4_0.3 when run from third_party/MonoGS.
# Saves same-run Gaussian output and emits one semantic queue task per MonoGS keyframe.

inherit_from: "configs/rgbd/replica/base_config.yaml"

Dataset:
  dataset_path: "../../datasets/Replica/office4_0.3"

Results:
  save_results: True
  save_dir: "../../output/replica_office4_03/results"
  save_trj: True
  use_gui: False
  eval_rendering: False
  use_wandb: False

OnlineSemantic:
  enabled: True
  queue_root: "../../output/replica_office4_03/queue"
  emit_init: True
  emit_keyframes: True
  keyframe_stride: 1
  max_pending: 250
  overwrite: False
